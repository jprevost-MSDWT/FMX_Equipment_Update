<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 40px);
      box-sizing: border-box;
      overflow: hidden;
    }
    #dropZone {
      width: 100%;
      height: 120px;
      border: 2px dashed #007bff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #007bff;
      font-size: 16px;
      cursor: pointer;
      background-color: #e9f3ff;
      transition: background-color 0.3s, border-color 0.3s;
    }
    #dropZone.dragover {
      background-color: #d1e7ff;
      border-color: #0056b3;
    }
    #fileInput {
      display: none;
    }
    /* Toast Notification Animation */
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .toast-animate {
      animation: slideUp 0.3s ease-out forwards;
    }
  </style>
</head>
<body>

  <div id="dropZone">
    <span>Drag & Drop a CSV/TXT/XLSX file here<br>or click to select</span>
  </div>
  <input type="file" id="fileInput" accept=".csv,.txt,.tsv,.xlsx,.xls">

  <div id="buttonContainer" class="mt-5 w-full">
    <button id="importBtn" disabled class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors">
      Import
    </button>
  </div>

  <!-- Toast Container -->
  <div id="toast" class="hidden fixed bottom-4 left-4 right-4 p-3 rounded-lg text-white text-sm font-medium shadow-lg toast-animate z-50">
    <span id="toastMessage"></span>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const importBtn = document.getElementById('importBtn');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');
    
    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      handleFile(e.target.files[0]);
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropZone.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    });

    /**
     * Updates the UI when a file is selected.
     */
    function handleFile(file) {
      if (file) {
        selectedFile = file;
        dropZone.querySelector('span').textContent = `File selected: ${file.name}`;
        importBtn.disabled = false;
      }
    }

    /**
     * Displays a toast message instead of a browser alert.
     */
    function showToast(msg, isError = false) {
      toastMessage.textContent = msg;
      toast.classList.remove('hidden', 'bg-red-500', 'bg-green-600');
      toast.classList.add(isError ? 'bg-red-500' : 'bg-green-600');
      
      // If it's an error, hide it after 5 seconds. Success stays until close.
      if (isError) {
        setTimeout(() => {
          toast.classList.add('hidden');
        }, 5000);
      }
    }

    /**
     * Callback for successful import.
     */
    function importSuccess(status) {
      showToast(status, false);
      importBtn.textContent = 'Success!';
      
      // Auto-close dialog after 1.5 seconds
      setTimeout(() => {
        google.script.host.close();
      }, 1500);
    }

    /**
     * Callback for failed import.
     */
    function importFailure(error) {
      showToast('Error: ' + error.message, true);
      importBtn.disabled = false;
      importBtn.textContent = 'Import';
    }

    importBtn.addEventListener('click', () => {
      if (!selectedFile) return;

      importBtn.disabled = true;
      importBtn.textContent = 'Uploading...';

      const reader = new FileReader();
      
      // For Excel and large CSVs, we read as DataURL (Base64) to pass to GS
      reader.onload = (e) => {
        const fileContent = e.target.result;
        const fileType = selectedFile.type;
        const fileName = selectedFile.name;
        
        google.script.run
          .withSuccessHandler(importSuccess)
          .withFailureHandler(importFailure)
          .importData(fileContent, fileType, fileName);
      };
      
      reader.onerror = () => {
        showToast("Error reading file locally.", true);
        importBtn.disabled = false;
        importBtn.textContent = 'Import';
      };

      reader.readAsDataURL(selectedFile);
    });
  </script>
</body>
</html>
