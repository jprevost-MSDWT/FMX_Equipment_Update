<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body { font-family: Arial, sans-serif; background-color: #f0f2f5; padding: 8px; margin: 0; }
      .container { background-color: #ffffff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
      .tab { overflow: hidden; border-bottom: 1px solid #ccc; background-color: #f1f1f1; border-radius: 4px 4px 0 0; display: flex; }
      .tab button { background-color: inherit; border: none; outline: none; cursor: pointer; padding: 10px 16px; transition: 0.3s; font-size: 0.9em; flex: 1; border-radius: 4px 4px 0 0; font-weight: bold; color: #5f6368; }
      .tab button:hover { background-color: #ddd; }
      .tab button.active { background-color: #ccc; color: #000; }
      .tabcontent { display: none; padding: 12px 0px; border-top: none; }
      .action-button { width: 100%; padding: 12px; margin-top: 8px; border: none; background-color: #8ab4f8; color: #000000; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 0.9em; text-align: left; transition: background-color 0.2s, color 0.2s; }
      .action-button:hover { background-color: #3367D6; color: #ffffff; }
      
      .instructions { margin-top: 15px; font-size: 0.8em; color: #5f6368; padding: 10px; background-color: #f8f9fa; border-radius: 4px; border: 1px solid #dee2e6; }
      
      /* Required Headers Styling */
      .required-box { margin-bottom: 10px; padding: 8px; background-color: #eef3fe; border-left: 4px solid #3367D6; border-radius: 4px; }
      .required-title { font-weight: bold; font-size: 0.85em; color: #3367D6; margin-bottom: 4px; }
      .required-list { font-size: 0.8em; color: #444; display: flex; flex-wrap: wrap; gap: 5px; }
      .required-item { background: #fff; padding: 2px 6px; border-radius: 3px; border: 1px solid #d1d9e6; }

      .checkbox-group { display: flex; flex-direction: column; gap: 10px; max-height: 200px; overflow-y: auto; margin-top: 10px; padding: 8px; border: 1px solid #eee; border-radius: 4px; background: #fff; }
      .checkbox-label { display: flex; align-items: center; font-size: 0.9em; color: #333; cursor: pointer; user-select: none; }
      .checkbox-label input { margin-right: 12px; width: 16px; height: 16px; cursor: pointer; }
      
      .loading-text { color: #666; font-style: italic; padding: 10px; text-align: center; }
      .refresh-btn { float: right; cursor: pointer; border: none; background: none; color: #1a73e8; font-size: 0.9em; padding: 0; font-weight: bold; }

      /* Toast Notifications */
      #toast-container { visibility: hidden; min-width: 250px; margin-left: -125px; background-color: #333; color: #fff; text-align: center; border-radius: 4px; padding: 16px; position: fixed; z-index: 1; left: 50%; bottom: 30px; font-size: 14px; opacity: 0; transition: opacity 0.5s, bottom 0.5s; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
      #toast-container.show { visibility: visible; opacity: 1; bottom: 50px; }
      #toast-container.error { background-color: #d93025; }
      #toast-container.success { background-color: #188038; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="tab">
        <button class="tablinks active" onclick="openTab(event, 'MainActions')" id="defaultOpen">Actions</button>
        <button class="tablinks" onclick="openTab(event, 'Settings')">Settings</button>
      </div>

      <div id="MainActions" class="tabcontent" style="display: block;">
        <button class="action-button" onclick="runImport()">Import Excel File</button>
      </div>

      <div id="Settings" class="tabcontent">
         <div class="instructions">
           <!-- Required Section (Non-selectable) -->
           <div class="required-box">
             <div class="required-title">Core Headers (Always Included):</div>
             <div id="required-headers-list" class="required-list">
               <span class="loading-text">Loading...</span>
             </div>
           </div>

           <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
             <strong>Selectable Headers:</strong>
             <button class="refresh-btn" onclick="loadSettings()" title="Reload list">&#x21bb; Refresh</button>
           </div>
           <div id="settings-container" class="checkbox-group">
             <div class="loading-text">Loading options...</div>
           </div>
         </div>
         <button class="action-button" onclick="saveSettings()">Apply Selection</button>
      </div>
    </div>

    <div id="toast-container"></div>

    <script>
      var settingsLoaded = false;
      var requiredHeaders = [];

      function runImport() { google.script.run.withFailureHandler(showError).promptForImport(); }
      
      function saveSettings() {
        const checkboxes = document.querySelectorAll('#settings-container input[type="checkbox"]:checked');
        const userSelected = Array.from(checkboxes).map(cb => cb.value);
        
        // Combine Required (hidden/static) + User Selected (from checkboxes)
        const finalSelection = [...requiredHeaders, ...userSelected];
        
        const btn = document.querySelector('button[onclick="saveSettings()"]');
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = "Saving...";

        google.script.run
          .withSuccessHandler(function() {
             showToast("Selection saved successfully!", false);
             btn.disabled = false;
             btn.textContent = originalText;
          })
          .withFailureHandler(function(err) {
             showError(err);
             btn.disabled = false;
             btn.textContent = originalText;
          })
          .saveSelectedHeaders(finalSelection);
      }

      function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tabcontent");
        for (i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
        tablinks = document.getElementsByClassName("tablinks");
        for (i = 0; i < tablinks.length; i++) tablinks[i].className = tablinks[i].className.replace(" active", "");
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
        if (tabName === 'Settings' && !settingsLoaded) loadSettings();
      }

      function loadSettings() {
        const container = document.getElementById('settings-container');
        const reqList = document.getElementById('required-headers-list');
        
        container.innerHTML = '<div class="loading-text">Fetching data...</div>';
        
        // Phase 1: Fetch Required (Static list)
        google.script.run.withSuccessHandler(function(reqs) {
          requiredHeaders = reqs;
          reqList.innerHTML = reqs.map(h => `<span class="required-item">${h}</span>`).join('');
          
          // Phase 2: Fetch Default Selected (Checked by default)
          google.script.run.withSuccessHandler(function(defaults) {
            
            // Phase 3: Fetch Optional (Unchecked by default)
            google.script.run.withSuccessHandler(function(optionals) {
               renderAllCheckboxes(defaults, optionals);
            }).withFailureHandler(showError).getImportHeaderOptions();

          }).withFailureHandler(showError).getDefaultSelectedHeaders();

        }).getRequiredHeaders();
      }

      function renderAllCheckboxes(defaults, optionals) {
        const container = document.getElementById('settings-container');
        container.innerHTML = ''; 

        const allOptions = [
          ...defaults.map(v => ({ value: v, checked: true })),
          ...optionals.map(v => ({ value: v, checked: false }))
        ];

        if (allOptions.length === 0) { 
          container.innerHTML = '<div class="loading-text">No headers found.</div>'; 
          return; 
        }

        allOptions.forEach(function(item) {
          var label = document.createElement('label');
          label.className = 'checkbox-label';
          var input = document.createElement('input');
          input.type = 'checkbox';
          input.value = item.value;
          if (item.checked) input.checked = true;
          
          label.appendChild(input);
          label.appendChild(document.createTextNode(item.value));
          container.appendChild(label);
        });
        settingsLoaded = true;
      }

      function showError(err) { 
        showToast("Error: " + (err.message || err), true); 
      }

      function showToast(message, isError) {
        var x = document.getElementById("toast-container");
        x.textContent = message;
        x.className = "show " + (isError ? "error" : "success");
        setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
      }

      document.getElementById("defaultOpen").click();
    </script>
  </body>
</html>
