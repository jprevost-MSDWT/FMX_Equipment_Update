<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom Scrollbar for the checkbox group */
      .checkbox-group::-webkit-scrollbar { width: 6px; }
      .checkbox-group::-webkit-scrollbar-track { background: #f1f1f1; }
      .checkbox-group::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
      
      /* Toast animations */
      #toast-container { visibility: hidden; opacity: 0; transition: opacity 0.5s, bottom 0.5s; }
      #toast-container.show { visibility: visible; opacity: 1; bottom: 50px; }
    </style>
  </head>
  <body class="bg-[#f0f2f5] p-2 m-0 font-sans text-sm">
    <div class="bg-white p-[15px] rounded-lg shadow-[0_4px_8px_rgba(0,0,0,0.1)]">
      
      <div class="flex border-b border-[#ccc] bg-[#f1f1f1] rounded-t-md overflow-hidden">
        <button id="defaultOpen" class="tablinks flex-1 py-[10px] px-4 text-[0.9em] font-bold text-[#5f6368] transition-colors hover:bg-[#ddd] outline-none focus:ring-2 focus:ring-inset focus:ring-blue-400" onclick="openTab(event, 'MainActions')">
          Actions
        </button>
        <button class="tablinks flex-1 py-[10px] px-4 text-[0.9em] font-bold text-[#5f6368] transition-colors hover:bg-[#ddd] outline-none focus:ring-2 focus:ring-inset focus:ring-blue-400" onclick="openTab(event, 'Settings')">
          Settings
        </button>
      </div>
      
      <div id="MainActions" class="tabcontent py-3 block">
        <button class="w-full p-3 mt-2 bg-[#8ab4f8] text-black font-bold rounded text-left text-[0.9em] hover:bg-[#3367D6] hover:text-white transition-all shadow-sm active:scale-[0.98]" onclick="runImport()">
          Import Edit
        </button>
        <button class="w-full p-3 mt-2 bg-[#8ab4f8] text-black font-bold rounded text-left text-[0.9em] hover:bg-[#3367D6] hover:text-white transition-all shadow-sm active:scale-[0.98]" onclick="runPrepExport()">
          Prep Export
        </button>
      </div>

      <div id="Settings" class="tabcontent py-3 hidden">
         <div class="mt-[15px] text-[0.8em] text-[#5f6368] p-[10px] bg-[#f8f9fa] border border-[#dee2e6] rounded">
           <div class="mb-[10px] p-2 bg-[#eef3fe] border-left-4 border-[#3367D6] rounded">
             <div class="font-bold text-[0.85em] text-[#3367D6] mb-1">Core Headers (Always Included):</div>
             <div id="required-headers-list" class="flex flex-wrap gap-[5px] text-[0.8em] text-[#444]">
               <span class="italic text-gray-400">Loading...</span>
             </div>
           </div>
           
           <div class="flex justify-between items-center mt-[10px]">
             <strong class="text-gray-700">Optional Headers:</strong>
             <button class="text-[#1a73e8] font-bold hover:underline" onclick="loadSettings()" title="Reload list">&#x21bb; Refresh</button>
           </div>

           <div id="settings-container" class="checkbox-group flex flex-col gap-[10px] max-h-[200px] overflow-y-auto mt-[10px] p-2 border border-[#eee] rounded bg-white">
             <div class="italic text-gray-400 text-center p-2">Loading options...</div>
           </div>
         </div>

         <!-- Combined Button Action -->
         <button id="save-settings-btn" class="w-full p-3 mt-2 bg-[#8ab4f8] text-black font-bold rounded text-left text-[0.9em] hover:bg-[#3367D6] hover:text-white transition-all shadow-sm" onclick="saveAndSyncSettings()">
           Apply & Sync Data Mapping
         </button>
         
         <div class="mt-[10px] text-[0.75em] text-[#5f6368] p-2 bg-[#f8f9fa] border border-[#dee2e6] rounded">
           Applying selection will save your header choices and automatically re-sync the Equipment Edit sheet.
         </div>

         <hr class="border-t-2 border-black my-[25px]">

         <div class="text-[0.75em] text-[#5f6368] mb-3 italic">
           Below settings are for configuration settings & updates.
         </div>

         <div class="mt-[15px] space-y-2">
           <div class="font-bold text-[0.85em] text-black mb-2">Data Extractions</div>
           <button class="w-full p-3 bg-[#B3FFCC] text-black font-bold border border-[#8ce3af] rounded text-left text-[0.9em] hover:bg-[#99e6b3] transition-all" onclick="runTypeExtraction()">
             Full Type Extraction
           </button>
           <button class="w-full p-3 bg-[#B3FFCC] text-black font-bold border border-[#8ce3af] rounded text-left text-[0.9em] hover:bg-[#99e6b3] transition-all" onclick="runTypeExtractionImport()">
             Type Extraction Import
           </button>
         </div>
      </div>
    </div>
    
    <div id="toast-container" class="fixed left-1/2 -translate-x-1/2 bottom-[30px] min-w-[250px] p-4 rounded text-white text-center text-sm z-50 shadow-lg"></div>

    <script>
      var settingsLoaded = false;
      var requiredHeaders = [];
      var toastTimeout;

      function openTab(evt, tabName) {
        document.querySelectorAll(".tabcontent").forEach(el => {
          el.classList.add('hidden');
          el.classList.remove('block');
        });
        document.querySelectorAll(".tablinks").forEach(el => {
          el.classList.remove('bg-[#ccc]', 'text-black');
          el.classList.add('text-[#5f6368]');
        });
        
        const target = document.getElementById(tabName);
        target.classList.remove('hidden');
        target.classList.add('block');
        
        evt.currentTarget.classList.add('bg-[#ccc]', 'text-black');
        evt.currentTarget.classList.remove('text-[#5f6368]');
        
        if (tabName === 'Settings' && !settingsLoaded) loadSettings();
      }

      function runImport() { 
        google.script.run.withFailureHandler(showError).promptForImport(); 
      }

      function runPrepExport() {
        showToast("Running export prep...", false);
        google.script.run
          .withSuccessHandler(function() { showToast("Export prep complete!", false); })
          .withFailureHandler(showError)
          .runExportProcess();
      }

      /**
       * Saves selected headers and re-syncs Equipment_Edit in a single server round trip
       * by calling the saveAndProcessHeaders wrapper on the backend.
       */
      function saveAndSyncSettings() {
        const btn = document.getElementById('save-settings-btn');
        const checkboxes = document.querySelectorAll('#settings-container input[type="checkbox"]:checked');
        const userSelected = Array.from(checkboxes).map(cb => cb.value);
        const finalSelection = [...requiredHeaders, ...userSelected];
        const defaultLabel = btn.textContent.trim();

        btn.disabled = true;
        btn.textContent = "Applying...";
        showToast("Saving & syncing...", false);

        google.script.run
          .withSuccessHandler(function(result) {
            showToast("Applied & synced!", false);
            btn.disabled = false;
            btn.textContent = defaultLabel;
          })
          .withFailureHandler(function(err) {
            showError(err);
            btn.disabled = false;
            btn.textContent = defaultLabel;
          })
          .saveAndProcessHeaders(finalSelection);
      }

      function runTypeExtraction() {
        google.script.run.withFailureHandler(showError).extractDataFromPDF();
      }

      function runTypeExtractionImport() {
        google.script.run.withFailureHandler(showError).showImportDialog();
      }

      function loadSettings() {
        const container = document.getElementById('settings-container');
        const reqList = document.getElementById('required-headers-list');
        container.innerHTML = '<div class="text-center italic text-gray-400 p-2">Fetching data...</div>';
        
        google.script.run
          .withSuccessHandler(function(config) {
            requiredHeaders = config.required;
            reqList.innerHTML = config.required.map(h => `<span class="bg-white px-[6px] py-[2px] rounded border border-[#d1d9e6] shadow-sm">${h}</span>`).join('');
            renderAllCheckboxes(config.defaults, config.optionals);
          })
          .withFailureHandler(showError)
          .getHeaderConfiguration();
      }

      function renderAllCheckboxes(defaults, optionals) {
        const container = document.getElementById('settings-container');
        container.innerHTML = ''; 
        
        const allOptions = [
          ...defaults.map(v => ({ value: v, checked: true })),
          ...optionals.map(v => ({ value: v, checked: false }))
        ];
        if (allOptions.length === 0) { 
           container.innerHTML = '<div class="text-center italic text-gray-400 p-2">No headers found.</div>'; 
           return; 
        }
        var fragment = document.createDocumentFragment();
        
        allOptions.forEach(function(item) {
          var label = document.createElement('label');
          label.className = 'flex items-center text-[0.9em] text-[#333] cursor-pointer select-none py-1 hover:bg-gray-50 rounded transition-colors';
          var input = document.createElement('input');
          input.type = 'checkbox';
          input.className = 'mr-3 w-4 h-4 cursor-pointer accent-blue-600';
          input.value = item.value;
          if (item.checked) input.checked = true;
          
          label.appendChild(input);
          label.appendChild(document.createTextNode(item.value));
          fragment.appendChild(label);
        });
        
        container.appendChild(fragment);
        settingsLoaded = true;
      }

      function showError(err) { showToast("Error: " + (err.message || err), true); }
      
      function showToast(message, isError) {
        const x = document.getElementById("toast-container");
        x.textContent = message;
        if (toastTimeout) clearTimeout(toastTimeout);
        x.classList.remove("bg-[#d93025]", "bg-[#188038]");
        x.classList.add("show", isError ? "bg-[#d93025]" : "bg-[#188038]");
        toastTimeout = setTimeout(() => {
          x.classList.remove("show");
        }, 3000);
      }
      
      document.getElementById("defaultOpen").click();
    </script>
  </body>
</html>
